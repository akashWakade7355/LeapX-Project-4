<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <link rel="stylesheet" href="../css/homePage.css">
        <link rel="stylesheet" href="../../chatbot/chatbot.css">
       
</head>
<body>
    <!--=========================
        Modern header
==========================-->

<header class="modern-footer">

    <div class="container-fluid px-5">

        <div class="footer-wrapper">

            <!-- Left -->

            <div class="footer-left">

                <a class="navbar-brand fw-bold fs-3" href="../../../index.html">
          <i class="bi bi-calendar-event-fill text-info"></i>
          Seed
        </a>


                <a href="./registeredEvents-upcomming.html">
                    <i class="bi bi-calendar-event"></i>
                    Registered Events
                </a>

                <a href="./homePage.html" class="active">

                         <i class="bi bi-compass"></i>

                    Discover

                </a>
                 <a href="../../Admin/html/orgaisers-dashboard.html">
                    <i class="bi bi-calendar-event"></i>
                    host
                </a>

            </div>

            
                
            <div class="footer-right">

                <a href="../../Admin/html/createEvent.html">
                    <button class="create-btn">

                    Create Event

                </button>

                </a>
                
             

                <button class="footer-icon notification">

                    <i class="bi bi-bell"></i>

                    <span></span>

                </button>

                <img
                    src="https://i.pravatar.cc/100?img=15"
                    class="footer-profile"
                >

            </div>

        </div>

    </div>

</header>


<!-- =========================
        DISCOVER EVENTS
========================== -->

<section class="discover-events">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="discover-title">
                    🎉 Discover Events
                </h2>
                <p class="discover-subtitle">
                    Browse all events created by organizers.
                </p>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-4">
                <input
                    type="date"
                    id="dateFilter"
                    class="form-control"
                >
            </div>
            <div class="col-md-4">
                <select
                    id="categoryFilter"
                    class="form-select"
                >
                    <option value="">All Categories</option>
                    <option value="Technology">Technology</option>
                    <option value="Music">Music</option>
                    <option value="Sports">Sports</option>
                    <option value="Education">Education</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Business">Business</option>
                    <option value="Food & Drinks">Food & Drinks</option>
                    <option value="Artificial Intelligence">Artificial Intelligence</option>
                    <option value="Arts & Culture">Arts & Culture</option>
                    <option value="Blockchain">Blockchain</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Wellness">Wellness</option>
                    <option value="Crypto">Crypto</option>
                    <option value="Startups">Startups</option>
                </select>
            </div>
            <div class="col-md-4">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search events..."
                >
            </div>
        </div>

        <div class="row g-4" id="eventsContainer">

            <!-- Events will be loaded here automatically -->

        </div>

    </div>

</section>




    <!--chatbot-->
    <div class="chat-widget">
        
      <div class="chat-popup">
        <h6>💬 Need Help?</h6>

        <p>Ask me about events.</p>
      </div>

      <button class="chat-btn" id="openChat">
        <img
          src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
          alt="AI Bot"
        />
      </button>
    </div>
 
    <div class="chat-window" id="chatWindow">

    <!-- Header -->
    <div class="chat-header">

        <h5>Seed bot</h5>

        <button id="closeChat">
            <i class="bi bi-x-lg"></i>
        </button>

    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chatBody">

    </div>

    <!-- Suggested Questions -->

    <div class="chat-suggestions">

        <button class="suggestion-btn">
            Tech Events
        </button>

        <button class="suggestion-btn">
            Workshops
        </button>

        <button class="suggestion-btn">
            Music
        </button>

        <button class="suggestion-btn">
            Weekend
        </button>

    </div>

    <!-- Footer -->

    <div class="chat-footer">

        <input
            type="text"
            id="userInput"
            placeholder="Ask something..."
        >

        <button id="sendBtn">

            <i class="bi bi-send-fill"></i>

        </button>

    </div>

</div>
<script src="../../chatbot/chatData.js"></script>
<script src="../../chatbot/chatbot.js"></script>
<script src="../js/homePage.js"></script>
</body>
</html>
