<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registered events</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
         <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="../css/registeredEvents.css">
     <link rel="stylesheet" href="../../chatbot/chatbot.css">
</head>
<body>
    
    <!--=========================
        Modern header
==========================-->

<header class="modern-footer">

    <div class="container-fluid px-5">

        <div class="footer-wrapper">

            <!-- Left -->

            <div class="footer-left">

                <a class="navbar-brand fw-bold fs-3" href="./homePage.html">
          <i class="bi bi-calendar-event-fill text-info"></i>
          Seed
        </a>

                <a href="#" class="active">
                    <i class="bi bi-calendar-event"></i>
                    Registered Events
                </a>

                <a href="./homePage.html" >

                    <i class="bi bi-compass"></i>

                    Discover

                </a>
                 <a href="../../Admin/html/orgaisers-dashboard.html">
                    <i class="bi bi-calendar-event"></i>
                    host
                </a>

            </div>

            
            <!-- Right -->

            <div class="footer-right">


               <a href="../../Admin/html/createEvent.html">
                    <button class="create-btn">

                    Create Event

                </button>

                </a>


                <button class="footer-icon notification">

                    <i class="bi bi-bell"></i>

                    <span></span>

                </button>

                <img
                    src="https://i.pravatar.cc/100?img=15"
                    class="footer-profile"
                >

            </div>

        </div>

    </div>

</header>


<!--=========================
    MY REGISTERED EVENTS
==========================-->

<section class="registered-events">

    <div class="container">

        <!-- Heading -->

        <div class="d-flex justify-content-between align-items-center mb-5">

            <div>

                <h2 class="section-heading">
                    🎟 My Registered Events
                </h2>

                <p class="section-subtitle">
                    Keep track of your upcoming and completed events.
                </p>

            </div>

            <div class="event-tabs">

                <button class="active" id="upcommingBtn">
                    Upcoming
                </button>

                <button id="pastBtn">
                    Past
                </button>

            </div>

        </div>
    </div>

</section>

<section class="pb-5">

    <div class="container">

        <div class="timeline" id="registeredEventsContainer">

            <!-- Upcoming registered events will appear here -->

        </div>

    </div>

</section>










    <!--chatbot-->
    <div class="chat-widget">
        
      <div class="chat-popup">
        <h6>💬 Need Help?</h6>

        <p>Ask me about events.</p>
      </div>

      <button class="chat-btn" id="openChat">
        <img
          src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
          alt="AI Bot"
        />
      </button>
    </div>
 
    <div class="chat-window" id="chatWindow">

    <!-- Header -->
    <div class="chat-header">

        <h5>Seed bot</h5>

        <button id="closeChat">
            <i class="bi bi-x-lg"></i>
        </button>

    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chatBody">

    </div>

    <!-- Suggested Questions -->

    <div class="chat-suggestions">

        <button class="suggestion-btn">
            Tech Events
        </button>

        <button class="suggestion-btn">
            Workshops
        </button>

        <button class="suggestion-btn">
            Music
        </button>

        <button class="suggestion-btn">
            Weekend
        </button>

    </div>

    <!-- Footer -->

    <div class="chat-footer">

        <input
            type="text"
            id="userInput"
            placeholder="Ask something..."
        >

        <button id="sendBtn">

            <i class="bi bi-send-fill"></i>

        </button>

    </div>

</div>
<script src="../../chatbot/chatData.js"></script>
<script src="../../chatbot/chatbot.js"></script>
<script src="../js/registeredEvents.js"></script>
</body>
</html>
