<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Event</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../css/createEvent.css">

</head>

<body>

<section class="create-event">

<div class="container py-5">

    <div class="page-title mb-5">

        <h1 id="pageTitle">Create New Event</h1>

        <p>Create public or private events in just a few minutes.</p>

    </div>

    <!-- Error summary box (added): lists all validation errors together -->
    <div id="errorSummary" class="error-summary">
        <strong><i class="bi bi-exclamation-triangle-fill"></i> Please fix the following:</strong>
        <ul id="errorList"></ul>
    </div>

    <!-- Success banner (added): replaces alert(), which some embedded/IDE
         browser previews silently block, making the button look "broken" -->
    <div id="successBanner" class="success-banner">
        <i class="bi bi-check-circle-fill"></i>
        <span id="successBannerText">Event Created Successfully! Redirecting to dashboard...</span>
    </div>

    <form id="createEventForm" novalidate>

<div class="row g-4">

<!-- ===========================
LEFT SIDE
============================ -->

<div class="col-lg-4">

<div class="card-box">

<h5 class="section-title">

<i class="bi bi-image"></i>

Event Banner

</h5>

<div class="banner-preview">

<img id="bannerPreview"
src="https://placehold.co/600x800?text=Upload+Banner">

</div>

<label class="upload-btn mt-3">

<input
type="file"
id="bannerInput"
accept="image/*"
hidden>

<i class="bi bi-upload"></i>

Choose Banner

</label>

</div>

</div>


<!-- ===========================
RIGHT SIDE
============================ -->

<div class="col-lg-8">

<div class="card-box">

<h5 class="section-title">

<i class="bi bi-pencil-square"></i>

Basic Information

</h5>

<div class="mb-3">

<label for="eventNameInput">Event Name</label>

<input
type="text"
id="eventNameInput"
class="form-control"
placeholder="Enter event name">

</div>

<div class="mb-3">

<label for="shortDescriptionInput">Short Description</label>

<input
type="text"
id="shortDescriptionInput"
class="form-control"
placeholder="One line summary">

</div>

<div class="mb-3">

<label for="descriptionInput">Description</label>

<textarea
id="descriptionInput"
rows="5"
class="form-control"
placeholder="Describe your event..."></textarea>

</div>

<div class="row">

<div class="col-md-6">

<label for="categorySelect">Category</label>

<select class="form-select" id="categorySelect">

<option selected disabled value="">

Choose Category

</option>

<option>Technology</option>

<option>Food and Drinks</option>

<option>Artificial Intelligence</option>

<option>Arts and Culture</option>

<option>Blockchain</option>

<option>Fitness</option>

<option>Wellness</option>

<option>Crypto</option>

<option>Startups</option>

</select>

</div>

<div class="col-md-6">

<label for="visibilitySelect">Visibility</label>

<select class="form-select" id="visibilitySelect">

<option value="public">Public</option>

<option value="private">Private</option>

</select>

</div>

</div>

</div>

</div>

</div>



<!-- ===========================
DATE & TIME
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-calendar-event"></i>

Date & Time

</h5>

<div class="row g-3">

<div class="col-md-3">

<label for="startDateInput">Start Date</label>

<input
type="date"
id="startDateInput"
class="form-control">

</div>

<div class="col-md-3">

<label for="startTimeInput">Start Time</label>

<input
type="time"
id="startTimeInput"
class="form-control">

</div>

<div class="col-md-3">

<label for="endDateInput">End Date</label>

<input
type="date"
id="endDateInput"
class="form-control">

</div>

<div class="col-md-3">

<label for="endTimeInput">End Time</label>

<input
type="time"
id="endTimeInput"
class="form-control">

</div>

</div>

</div>


<!-- ===========================
LOCATION
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-geo-alt"></i>

Location

</h5>

<div class="row">

<div class="col-md-4">

<label for="eventType">Event Type</label>

<select
class="form-select"
id="eventType">

<option value="offline">

Offline

</option>

<option value="online">

Online

</option>

</select>

</div>

<div class="col-md-8">

<div id="offlineLocation">

<label for="venueInput">Location</label>

<input
type="text"
id="venueInput"
class="form-control"
placeholder="Venue Name">

</div>

<div
id="onlineLocation"
style="display:none;">

<label for="meetingLinkInput">Meeting Link</label>

<input
type="url"
id="meetingLinkInput"
class="form-control"
placeholder="https://">

</div>

</div>

</div>

</div>



<!-- ===========================
REGISTRATION
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-people"></i>

Registration

</h5>

<div class="row g-3">

<div class="col-md-4">

<label for="joinMethodSelect">Joining Method</label>

<select class="form-select" id="joinMethodSelect">

<option value="instant">

Instant Join

</option>

<option value="approval">

Approval Required

</option>

</select>

</div>

<div class="col-md-4">

<label for="capacityInput">Capacity</label>

<input
type="number"
id="capacityInput"
class="form-control"
placeholder="Unlimited"
min="1">

</div>

<div class="col-md-4">

<label for="priceType">Event Type</label>

<select
class="form-select"
id="priceType">

<option value="free">

Free

</option>

<option value="paid">

Paid

</option>

</select>

</div>

</div>


<div
class="row mt-3"
id="ticketPrice"
style="display:none;">

<div class="col-md-4">

<label for="ticketPriceInput">Ticket Price</label>

<input
type="number"
id="ticketPriceInput"
class="form-control"
placeholder="₹"
min="1">

</div>

</div>

</div>



<!-- ===========================
BUTTONS
============================ -->

<div class="text-end mt-5">

<button
type="reset"
id="cancelBtn"
class="btn btn-outline-light px-5 me-3">

Cancel

</button>

    <button type="submit" id="submitBtn" class="btn btn-primary px-5">
Create Event
</button>


</div>

</form>

</div>

</section>

<script src="../js/createEvent.js"></script>

</body>

</html>
