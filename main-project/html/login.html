<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seed | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">

   <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <!-- Background -->
    <div class="background-overlay"></div>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="../html/index.html">
          <i class="bi bi-calendar-event-fill text-info"></i>
          Seed
        </a>


            <div class="ms-auto">

                <a href="signup.html" class="btn btn-outline-light rounded-pill px-4">
                    Sign Up
                </a>

            </div>

        </div>
    </nav>

    <!-- Login Section -->

    <section class="login-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-5 col-md-7">

                    <div class="login-card">

                        <div class="text-center mb-4">

                            <div class="login-icon">

                                <i class="bi bi-person-circle"></i>

                            </div>

                            <h2 class="mt-3">
                                Welcome Back
                            </h2>

                            <p class="text-secondary">
                                Login to continue exploring amazing events.
                            </p>

                        </div>

                        <form id="loginForm">

                            <!-- Email -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-envelope"></i>

                                    </span>

                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="Enter your email">

                                </div>

                                <small class="error" id="emailError"></small>

                            </div>

                            <!-- Password -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-lock"></i>

                                    </span>

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter your password">

                                    <button
                                        type="button"
                                        class="btn password-btn"
                                        id="togglePassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                                <small class="error" id="passwordError"></small>

                            </div>

                            <!-- Remember -->

                            <div
                                class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="remember">

                                    <label
                                        class="form-check-label">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="#" class="forgot-link">

                                    Forgot Password?

                                </a>

                            </div>

                            <!-- Button -->
           
                          
                                <button
                                type="submit"
                                class="btn login-btn w-100"
                                id="loginBtn">

                                <span id="btnText">

                                    Login

                                </span>

                                <span
                                    id="spinner"
                                    class="spinner-border spinner-border-sm d-none">

                                </span>

                            </button>
                   
                            

                        </form>

                        <div class="text-center mt-4">

                            <p class="mb-0">

                                Don't have an account?

                                <a
                                    href="signup.html"
                                    class="signup-link">

                                    Create Account

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="../js/login.js"></script>

</body>

</html>
