<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seed | Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/signup.css">

</head>

<body>

    <div class="background-overlay"></div>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark py-3">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="../html/index.html">
          <i class="bi bi-calendar-event-fill text-info"></i>
          Seed
        </a>


            <div class="ms-auto">

                <a href="login.html" class="btn btn-outline-light rounded-pill px-4">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <!-- Signup -->

    <section class="signup-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-6 col-md-8">

                    <div class="signup-card">

                        <div class="text-center mb-4">

                            <div class="signup-icon">

                                <i class="bi bi-person-plus-fill"></i>

                            </div>

                            <h2 class="mt-3">
                                Create Account
                            </h2>

                            <p>
                                Join Seed and discover amazing events.
                            </p>

                        </div>

                        <form id="signupForm">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="name"
                                        placeholder="John Doe">

                                    <small class="error" id="nameError"></small>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Username
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="username"
                                        placeholder="john123">

                                    <small class="error" id="usernameError"></small>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="john@gmail.com">

                                <small class="error" id="emailError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="tel"
                                    class="form-control"
                                    id="phone"
                                    placeholder="9876543210">

                                <small class="error" id="phoneError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="input-group">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Create Password">

                                    <button
                                        type="button"
                                        class="btn password-btn"
                                        id="togglePassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                                <div class="progress mt-2">

                                    <div
                                        class="progress-bar"
                                        id="strengthBar">

                                    </div>

                                </div>

                                <small id="strengthText"></small>

                                <small class="error" id="passwordError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="confirmPassword"
                                    placeholder="Confirm Password">

                                <small class="error" id="confirmError"></small>

                            </div>

                            <div class="form-check mb-4">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="terms">

                                <label class="form-check-label">

                                    I agree to the Terms & Conditions

                                </label>

                                <small class="error" id="termsError"></small>

                            </div>

                            <button
                            type="submit"
                                class="btn signup-btn w-100"
                                id="signupBtn">

                                <span id="btnText">

                                    Create Account

                                </span>

                                <span
                                    class="spinner-border spinner-border-sm d-none"
                                    id="spinner">

                                </span>

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            Already have an account?

                            <a href="login.html" class="signup-link">

                                Login

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="../js/signup.js"></script>

</body>

</html>
