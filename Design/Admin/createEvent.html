<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Event</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->


    <style>
        /*===============================
Google Font
================================*/

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:#0F172A;
    color:#fff;
}

/*===============================
Section
================================*/

.create-event{

    padding:70px 0;
}

.page-title{

    text-align:center;
}

.page-title h1{

    font-size:42px;
    font-weight:700;
}

.page-title p{

    color:#94A3B8;
    margin-top:10px;
}


/*===============================
Card
================================*/

.card-box{

    background:#1E293B;

    border:1px solid rgba(255,255,255,.06);

    border-radius:22px;

    padding:28px;

    transition:.35s;
}

.card-box:hover{

    transform:translateY(-4px);

    box-shadow:0 20px 45px rgba(0,0,0,.25);
}


/*===============================
Section Heading
================================*/

.section-title{

    font-size:22px;

    font-weight:600;

    margin-bottom:25px;
}

.section-title i{

    color:#3B82F6;

    margin-right:10px;
}


/*===============================
Labels
================================*/

label{

    display:block;

    margin-bottom:8px;

    font-size:14px;

    font-weight:500;

    color:#CBD5E1;
}


/*===============================
Inputs
================================*/

.form-control,
.form-select{

    height:52px;

    background:#0F172A;

    border:1px solid rgba(255,255,255,.08);

    color:white;

    border-radius:14px;

    transition:.3s;
}

textarea.form-control{

    height:auto;
    resize:none;
}

.form-control:focus,
.form-select:focus{

    background:#0F172A;

    color:white;

    border-color:#3B82F6;

    box-shadow:none;
}

.form-control::placeholder{

    color:#64748B;
}

.form-select option{

    color:black;
}


/*===============================
Banner
================================*/

.banner-preview{

    width:100%;

    height:470px;

    overflow:hidden;

    border-radius:18px;

    background:#0F172A;

    border:2px dashed rgba(255,255,255,.08);
}

.banner-preview img{

    width:100%;

    height:100%;

    object-fit:cover;
}


/*===============================
Upload Button
================================*/

.upload-btn{

    width:100%;

    background:#2563EB;

    color:white;

    text-align:center;

    padding:14px;

    border-radius:14px;

    cursor:pointer;

    font-weight:500;

    transition:.3s;
}

.upload-btn:hover{

    background:#1D4ED8;
}

.upload-btn i{

    margin-right:8px;
}


/*===============================
Buttons
================================*/

.btn-primary{

    background:#2563EB;

    border:none;

    border-radius:12px;

    height:52px;

    font-weight:600;

    transition:.3s;
}

.btn-primary:hover{

    background:#1D4ED8;

    transform:translateY(-2px);
}

.btn-outline-light{

    border-radius:12px;

    height:52px;
}


/*===============================
Spacing
================================*/

.mb-3{

    margin-bottom:22px !important;
}

.mt-4{

    margin-top:35px !important;
}


/*===============================
Scrollbar
================================*/

::-webkit-scrollbar{

    width:8px;
}

::-webkit-scrollbar-thumb{

    background:#334155;

    border-radius:20px;
}

::-webkit-scrollbar-track{

    background:#0F172A;
}


/*===============================
Responsive
================================*/

@media(max-width:991px){

.banner-preview{

height:350px;
}

.page-title h1{

font-size:34px;
}

.card-box{

padding:22px;
}

}

@media(max-width:768px){

.page-title h1{

font-size:30px;
}

.banner-preview{

height:280px;
}

.btn{

width:100%;

margin-top:10px;
}

.text-end{

text-align:center !important;
}

}
    </style>

</head>

<body>

<section class="create-event">

<div class="container py-5">

    <div class="page-title mb-5">

        <h1>Create New Event</h1>

        <p>Create public or private events in just a few minutes.</p>

    </div>


    <form id="createEventForm">

<div class="row g-4">

<!-- ===========================
LEFT SIDE
============================ -->

<div class="col-lg-4">

<div class="card-box">

<h5 class="section-title">

<i class="bi bi-image"></i>

Event Banner

</h5>

<div class="banner-preview">

<img id="bannerPreview"
src="https://placehold.co/600x800?text=Upload+Banner">

</div>

<label class="upload-btn mt-3">

<input
type="file"
id="bannerInput"
accept="image/*"
hidden>

<i class="bi bi-upload"></i>

Choose Banner

</label>

</div>

</div>


<!-- ===========================
RIGHT SIDE
============================ -->

<div class="col-lg-8">

<div class="card-box">

<h5 class="section-title">

<i class="bi bi-pencil-square"></i>

Basic Information

</h5>

<div class="mb-3">

<label>Event Name</label>

<input
type="text"
class="form-control"
placeholder="Enter event name">

</div>

<div class="mb-3">

<label>Short Description</label>

<input
type="text"
class="form-control"
placeholder="One line summary">

</div>

<div class="mb-3">

<label>Description</label>

<textarea
rows="5"
class="form-control"
placeholder="Describe your event..."></textarea>

</div>

<div class="row">

<div class="col-md-6">

<label>Category</label>

<select class="form-select">

<option selected disabled>

Choose Category

</option>

<option>Hackathon</option>

<option>Workshop</option>

<option>Seminar</option>

<option>AI</option>

<option>Technology</option>

<option>Networking</option>

<option>Startup</option>

<option>Web Development</option>

<option>Cyber Security</option>

<option>Cloud Computing</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6">

<label>Visibility</label>

<select class="form-select">

<option>Public</option>

<option>Private</option>

</select>

</div>

</div>

</div>

</div>

</div>



<!-- ===========================
DATE & TIME
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-calendar-event"></i>

Date & Time

</h5>

<div class="row g-3">

<div class="col-md-3">

<label>Start Date</label>

<input
type="date"
class="form-control">

</div>

<div class="col-md-3">

<label>Start Time</label>

<input
type="time"
class="form-control">

</div>

<div class="col-md-3">

<label>End Date</label>

<input
type="date"
class="form-control">

</div>

<div class="col-md-3">

<label>End Time</label>

<input
type="time"
class="form-control">

</div>

</div>

</div>


<!-- ===========================
LOCATION
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-geo-alt"></i>

Location

</h5>

<div class="row">

<div class="col-md-4">

<label>Event Type</label>

<select
class="form-select"
id="eventType">

<option value="offline">

Offline

</option>

<option value="online">

Online

</option>

</select>

</div>

<div class="col-md-8">

<div id="offlineLocation">

<label>Location</label>

<input
type="text"
class="form-control"
placeholder="Venue Name">

</div>

<div
id="onlineLocation"
style="display:none;">

<label>Meeting Link</label>

<input
type="url"
class="form-control"
placeholder="https://">

</div>

</div>

</div>

</div>



<!-- ===========================
REGISTRATION
============================ -->

<div class="card-box mt-4">

<h5 class="section-title">

<i class="bi bi-people"></i>

Registration

</h5>

<div class="row g-3">

<div class="col-md-4">

<label>Joining Method</label>

<select class="form-select">

<option>

Instant Join

</option>

<option>

Approval Required

</option>

</select>

</div>

<div class="col-md-4">

<label>Capacity</label>

<input
type="number"
class="form-control"
placeholder="Unlimited">

</div>

<div class="col-md-4">

<label>Event Type</label>

<select
class="form-select"
id="priceType">

<option value="free">

Free

</option>

<option value="paid">

Paid

</option>

</select>

</div>

</div>


<div
class="row mt-3"
id="ticketPrice"
style="display:none;">

<div class="col-md-4">

<label>Ticket Price</label>

<input
type="number"
class="form-control"
placeholder="₹">

</div>

</div>

</div>



<!-- ===========================
BUTTONS
============================ -->

<div class="text-end mt-5">

<button
type="reset"
class="btn btn-outline-light px-5 me-3">

Cancel

</button>

    <button
type="submit"
class="btn btn-primary px-5">

Create Event

</button>


</div>

</form>

</div>

</section>

<script>

    // ==========================================
// Banner Image Preview
// ==========================================

const bannerInput = document.getElementById("bannerInput");
const bannerPreview = document.getElementById("bannerPreview");

bannerInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {

        bannerPreview.src = e.target.result;

    }

    reader.readAsDataURL(file);

});



// ==========================================
// Online / Offline Toggle
// ==========================================

const eventType = document.getElementById("eventType");

const offlineLocation = document.getElementById("offlineLocation");

const onlineLocation = document.getElementById("onlineLocation");

eventType.addEventListener("change", () => {

    if (eventType.value === "online") {

        onlineLocation.style.display = "block";

        offlineLocation.style.display = "none";

    }

    else {

        onlineLocation.style.display = "none";

        offlineLocation.style.display = "block";

    }

});



// ==========================================
// Free / Paid Event
// ==========================================

const priceType = document.getElementById("priceType");

const ticketPrice = document.getElementById("ticketPrice");

priceType.addEventListener("change", () => {

    if (priceType.value === "paid") {

        ticketPrice.style.display = "flex";

    }

    else {

        ticketPrice.style.display = "none";

    }

});



// ==========================================
// Form Validation
// ==========================================

const form = document.getElementById("createEventForm");

form.addEventListener("submit", function (e) {

    e.preventDefault();

    const eventName = document.querySelector("input[placeholder='Enter event name']").value.trim();

    const shortDescription = document.querySelector("input[placeholder='One line summary']").value.trim();

    const description = document.querySelector("textarea").value.trim();

    const category = document.querySelector("select").value;

    const startDate = document.querySelector("input[type='date']").value;

    const startTime = document.querySelector("input[type='time']").value;

    if (
        eventName === "" ||
        shortDescription === "" ||
        description === "" ||
        category === "Choose Category" ||
        startDate === "" ||
        startTime === ""
    ) {

        alert("Please fill all required fields.");

        return;

    }

    createEvent();

});



// ==========================================
// Create Event Object
// ==========================================

function createEvent() {

    const inputs = document.querySelectorAll("input");

    const selects = document.querySelectorAll("select");

    const textarea = document.querySelector("textarea");

    const event = {

        id: generateID(),

        banner: bannerPreview.src,

        name: inputs[1].value,

        shortDescription: inputs[2].value,

        description: textarea.value,

        category: selects[0].value,

        visibility: selects[1].value,

        startDate: inputs[3].value,

        startTime: inputs[4].value,

        endDate: inputs[5].value,

        endTime: inputs[6].value,

        eventMode: selects[2].value,

        location:
            selects[2].value === "online"
                ? inputs[8].value
                : inputs[7].value,

        joinMethod: selects[3].value,

        capacity: inputs[9].value,

        priceType: selects[4].value,

        ticketPrice:
            selects[4].value === "paid"
                ? inputs[10].value
                : "Free",

        createdAt: new Date(),

        attendees: []

    };



    let events = JSON.parse(localStorage.getItem("events")) || [];

    events.push(event);

    localStorage.setItem("events", JSON.stringify(events));

    successMessage();

}



// ==========================================
// Unique ID
// ==========================================

function generateID() {

    return "EVT-" + Date.now();

}



// ==========================================
// Success Popup
// ==========================================

function successMessage() {

    alert("🎉 Event Created Successfully!");

    form.reset();

    bannerPreview.src = "https://placehold.co/600x800?text=Upload+Banner";

    ticketPrice.style.display = "none";

    onlineLocation.style.display = "none";

    offlineLocation.style.display = "block";

    // Redirect to Organizer Dashboard
    window.location.href = "./orgaisers-dashboard.html";

}



// ==========================================
// Prevent End Date Before Start Date
// ==========================================

const dates = document.querySelectorAll("input[type='date']");

const times = document.querySelectorAll("input[type='time']");

dates[0].addEventListener("change", () => {

    dates[1].min = dates[0].value;

});

times[0].addEventListener("change", () => {

    if (dates[0].value === dates[1].value) {

        times[1].min = times[0].value;

    }

});



// ==========================================
// Character Counter (Optional)
// ==========================================

const desc = document.querySelector("textarea");

desc.addEventListener("input", () => {

    console.log(`Characters : ${desc.value.length}`);

});



// ==========================================
// Load Existing Events (Optional)
// ==========================================

function loadEvents() {

    const events = JSON.parse(localStorage.getItem("events")) || [];

    console.log(events);

}

loadEvents();
</script>

</body>

</html>
