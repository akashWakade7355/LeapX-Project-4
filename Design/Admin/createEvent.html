<body>

<script>

// ==========================================================
// CONFIG
// ==========================================================
// Central place for constants so magic strings aren't scattered
// across the file.
// ==========================================================

const STORAGE_KEY = "events";
const DASHBOARD_URL = "./orgaisers-dashboard.html";
const DEFAULT_BANNER = "https://placehold.co/600x800?text=Upload+Banner";


// ==========================================================
// ELEMENT REFERENCES
// ==========================================================
// All fields are looked up ONCE by id and cached here.
// Using ids (instead of positional querySelector like inputs[3])
// means the form can be reordered/extended later without
// silently breaking the script.
// ==========================================================

const form                 = document.getElementById("createEventForm");

const bannerInput          = document.getElementById("bannerInput");
const bannerPreview        = document.getElementById("bannerPreview");

const eventNameInput       = document.getElementById("eventNameInput");
const shortDescriptionInput= document.getElementById("shortDescriptionInput");
const descriptionInput     = document.getElementById("descriptionInput");
const categorySelect       = document.getElementById("categorySelect");
const visibilitySelect     = document.getElementById("visibilitySelect");

const startDateInput       = document.getElementById("startDateInput");
const startTimeInput       = document.getElementById("startTimeInput");
const endDateInput         = document.getElementById("endDateInput");
const endTimeInput         = document.getElementById("endTimeInput");

const eventTypeSelect      = document.getElementById("eventType");
const offlineLocationBox   = document.getElementById("offlineLocation");
const onlineLocationBox    = document.getElementById("onlineLocation");
const venueInput           = document.getElementById("venueInput");
const meetingLinkInput     = document.getElementById("meetingLinkInput");

const joinMethodSelect     = document.getElementById("joinMethodSelect");
const capacityInput        = document.getElementById("capacityInput");
const priceTypeSelect      = document.getElementById("priceType");
const ticketPriceBox       = document.getElementById("ticketPrice");
const ticketPriceInput     = document.getElementById("ticketPriceInput");

const errorSummary         = document.getElementById("errorSummary");
const errorList            = document.getElementById("errorList");
const successBanner        = document.getElementById("successBanner");


// ==========================================================
// BANNER IMAGE PREVIEW
// ==========================================================
// Reads the chosen file as a Data URL and shows it immediately,
// so the admin can confirm the banner before submitting.
// ==========================================================

function initBannerPreview() {
    bannerInput.addEventListener("change", () => {
        const file = bannerInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            bannerPreview.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}


// ==========================================================
// ONLINE / OFFLINE LOCATION TOGGLE
// ==========================================================
// Shows only the relevant location field based on event type,
// so the form never submits both a venue and a meeting link.
// ==========================================================

function initLocationToggle() {
    eventTypeSelect.addEventListener("change", toggleLocationFields);
    toggleLocationFields(); // set correct initial state
}

function toggleLocationFields() {
    const isOnline = eventTypeSelect.value === "online";
    onlineLocationBox.style.display  = isOnline ? "block" : "none";
    offlineLocationBox.style.display = isOnline ? "none"  : "block";
}


// ==========================================================
// FREE / PAID TICKET TOGGLE
// ==========================================================

function initPriceToggle() {
    priceTypeSelect.addEventListener("change", toggleTicketPriceField);
    toggleTicketPriceField(); // set correct initial state
}

function toggleTicketPriceField() {
    const isPaid = priceTypeSelect.value === "paid";
    ticketPriceBox.style.display = isPaid ? "flex" : "none";
    if (!isPaid) {
        ticketPriceInput.value = ""; // clear stale value when switching back to free
    }
}


// ==========================================================
// DATE CONSTRAINTS
// ==========================================================
// Prevents picking an end date earlier than the start date at
// the browser level (native date picker "min" attribute).
// Full start-vs-end validation still happens again on submit,
// since users can bypass native constraints by typing directly.
// ==========================================================

function initDateConstraints() {
    startDateInput.addEventListener("change", () => {
        endDateInput.min = startDateInput.value;
    });

    startTimeInput.addEventListener("change", () => {
        if (startDateInput.value && startDateInput.value === endDateInput.value) {
            endTimeInput.min = startTimeInput.value;
        }
    });
}


// ==========================================================
// VALIDATION HELPERS
// ==========================================================

// Marks/unmarks a field as invalid using Bootstrap's is-invalid class
function setFieldValidity(field, isValid) {
    field.classList.toggle("is-invalid", !isValid);
}

function clearAllFieldValidity() {
    document
        .querySelectorAll(".is-invalid")
        .forEach((el) => el.classList.remove("is-invalid"));
}

function showErrors(errors) {
    errorList.innerHTML = "";
    errors.forEach((message) => {
        const li = document.createElement("li");
        li.textContent = message;
        errorList.appendChild(li);
    });
    errorSummary.style.display = "block";
    errorSummary.scrollIntoView({ behavior: "smooth", block: "start" });
}

function hideErrors() {
    errorSummary.style.display = "none";
    errorList.innerHTML = "";
}


// ==========================================================
// MAIN VALIDATION
// ==========================================================
// Checks every required field, plus the more complex rules
// (date/time ordering, capacity, ticket price). Returns a list
// of human-readable error messages; an empty list means the
// form is valid.
// ==========================================================

function validateForm() {
    clearAllFieldValidity();
    const errors = [];

    // --- Basic required text fields ---
    if (eventNameInput.value.trim() === "") {
        errors.push("Event name is required.");
        setFieldValidity(eventNameInput, false);
    }

    if (shortDescriptionInput.value.trim() === "") {
        errors.push("Short description is required.");
        setFieldValidity(shortDescriptionInput, false);
    }

    if (descriptionInput.value.trim() === "") {
        errors.push("Description is required.");
        setFieldValidity(descriptionInput, false);
    }

    if (categorySelect.value === "") {
        errors.push("Please choose a category.");
        setFieldValidity(categorySelect, false);
    }

    // --- Date & time ---
    if (!startDateInput.value) {
        errors.push("Start date is required.");
        setFieldValidity(startDateInput, false);
    }

    if (!startTimeInput.value) {
        errors.push("Start time is required.");
        setFieldValidity(startTimeInput, false);
    }

    if (!endDateInput.value) {
        errors.push("End date is required.");
        setFieldValidity(endDateInput, false);
    }

    if (!endTimeInput.value) {
        errors.push("End time is required.");
        setFieldValidity(endTimeInput, false);
    }

    // Only compare start/end as real datetimes once all four values exist
    if (startDateInput.value && startTimeInput.value && endDateInput.value && endTimeInput.value) {
        const startDateTime = new Date(`${startDateInput.value}T${startTimeInput.value}`);
        const endDateTime   = new Date(`${endDateInput.value}T${endTimeInput.value}`);

        if (endDateTime <= startDateTime) {
            errors.push("End date & time must be after the start date & time.");
            setFieldValidity(endDateInput, false);
            setFieldValidity(endTimeInput, false);
        }
    }

    // --- Location (depends on online/offline toggle) ---
    if (eventTypeSelect.value === "online") {
        if (meetingLinkInput.value.trim() === "") {
            errors.push("Meeting link is required for online events.");
            setFieldValidity(meetingLinkInput, false);
        }
    } else {
        if (venueInput.value.trim() === "") {
            errors.push("Venue is required for offline events.");
            setFieldValidity(venueInput, false);
        }
    }

    // --- Capacity: optional field, but if provided must be a positive number ---
    if (capacityInput.value !== "") {
        const capacity = Number(capacityInput.value);
        if (!Number.isFinite(capacity) || capacity <= 0) {
            errors.push("Capacity must be a positive number (leave blank for unlimited).");
            setFieldValidity(capacityInput, false);
        }
    }

    // --- Ticket price: required and positive only when the event is paid ---
    if (priceTypeSelect.value === "paid") {
        const price = Number(ticketPriceInput.value);
        if (ticketPriceInput.value === "" || !Number.isFinite(price) || price <= 0) {
            errors.push("Ticket price must be a positive number for paid events.");
            setFieldValidity(ticketPriceInput, false);
        }
    }

    return errors;
}


// ==========================================================
// UNIQUE ID GENERATION
// ==========================================================
// Prefers crypto.randomUUID() (collision-safe). Falls back to a
// timestamp + random suffix for older browsers where it's
// unavailable.
// ==========================================================

function generateEventId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return "EVT-" + window.crypto.randomUUID();
    }
    const randomSuffix = Math.random().toString(16).slice(2, 8);
    return `EVT-${Date.now()}-${randomSuffix}`;
}


// ==========================================================
// BUILD EVENT OBJECT
// ==========================================================
// Shapes the form data into the event object used by the
// listing page, matching the PRD's expected fields.
// ==========================================================

function buildEventObject() {
    const isOnline = eventTypeSelect.value === "online";
    const isPaid   = priceTypeSelect.value === "paid";

    return {
        id: generateEventId(),

        // PRD fields
        title: eventNameInput.value.trim(),
        description: descriptionInput.value.trim(),
        shortDescription: shortDescriptionInput.value.trim(),
        category: categorySelect.value,
        date: startDateInput.value,
        time: startTimeInput.value,
        endDate: endDateInput.value,
        endTime: endTimeInput.value,
        venue: isOnline ? meetingLinkInput.value.trim() : venueInput.value.trim(),
        bannerImage: bannerPreview.src,
        attendees: [],
        maxAttendees: capacityInput.value === "" ? null : Number(capacityInput.value),

        // Extra fields useful for the listing/registration flow
        visibility: visibilitySelect.value,
        eventMode: eventTypeSelect.value,
        joinMethod: joinMethodSelect.value,
        priceType: priceTypeSelect.value,
        ticketPrice: isPaid ? Number(ticketPriceInput.value) : 0,

        createdAt: new Date().toISOString()
    };
}


// ==========================================================
// LOCALSTORAGE PERSISTENCE
// ==========================================================
// Reads existing events (if any), appends the new one, and
// writes back. Wrapped in try/catch to handle storage-disabled
// or storage-full environments gracefully instead of crashing.
// ==========================================================

function getStoredEvents() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
    } catch (error) {
        console.error("Failed to read events from localStorage:", error);
        return [];
    }
}

function saveEventToStorage(event) {
    try {
        const events = getStoredEvents();
        events.push(event);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        return true;
    } catch (error) {
        console.error("Failed to save event to localStorage:", error);
        return false;
    }
}


// ==========================================================
// FORM RESET / SUCCESS UI
// ==========================================================

function resetFormUI() {
    form.reset();
    bannerPreview.src = DEFAULT_BANNER;
    toggleTicketPriceField();
    toggleLocationFields();
    clearAllFieldValidity();
    hideErrors();
    successBanner.style.display = "none";
}

function showSuccessAndRedirect() {
    // Uses an in-page banner instead of alert(), because alert() is
    // silently blocked in some embedded/IDE browser previews (e.g. VS
    // Code Live Preview), which made the button look unresponsive even
    // though the event was actually being saved correctly.
    successBanner.style.display = "block";
    if (typeof successBanner.scrollIntoView === "function") {
        successBanner.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // Give the user a moment to see the confirmation before navigating away.
    window.setTimeout(() => {
        resetFormUI();
        window.location.href = DASHBOARD_URL;
    }, 1200);
}


// ==========================================================
// FORM SUBMIT HANDLER
// ==========================================================

function handleFormSubmit(e) {
    e.preventDefault();

    const errors = validateForm();

    if (errors.length > 0) {
        showErrors(errors);
        return;
    }

    hideErrors();
    successBanner.style.display = "none";

    const newEvent = buildEventObject();
    const saved = saveEventToStorage(newEvent);

    if (!saved) {
        showErrors(["Could not save the event. Your browser storage may be full or disabled."]);
        return;
    }

    showSuccessAndRedirect();
}


// ==========================================================
// INIT
// ==========================================================
// Wires up all event listeners once the script loads.
// ==========================================================

function init() {
    // Each setup step is wrapped individually so that one broken piece
    // (e.g. a missing element) can't silently prevent the submit handler
    // from being attached, which is what makes a button look "dead".
    const steps = [
        ["banner preview", initBannerPreview],
        ["location toggle", initLocationToggle],
        ["price toggle", initPriceToggle],
        ["date constraints", initDateConstraints]
    ];

    steps.forEach(([name, fn]) => {
        try {
            fn();
        } catch (error) {
            console.error(`Failed to initialize ${name}:`, error);
        }
    });

    // The submit handler is the most important piece — attach it last
    // and outside the loop above so a failure elsewhere can never skip it.
    try {
        form.addEventListener("submit", handleFormSubmit);
    } catch (error) {
        console.error("Failed to attach form submit handler:", error);
        showErrors(["Something went wrong loading the form. Check the browser console for details."]);
    }
}

init();

</script>
