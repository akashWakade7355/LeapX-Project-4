<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manage Event</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
<style>
    /*=====================================
Google Font
=====================================*/

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0F172A;
    color:#F8FAFC;
}

/*=====================================
Navbar
=====================================*/

.navbar{
    background:#111827;
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:18px 0;
}

.navbar-brand{
    font-size:26px;
}

/*=====================================
Banner
=====================================*/

.event-banner-card{

    overflow:hidden;

    border-radius:22px;

    border:1px solid rgba(255,255,255,.08);

    background:#1E293B;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.event-banner-card img{

    width:100%;

    height:400px;

    object-fit:cover;

}

/*=====================================
Event Info
=====================================*/

.event-info-card{

    background:#1E293B;

    border-radius:22px;

    padding:35px;

    border:1px solid rgba(255,255,255,.08);

    margin-bottom:40px;

}

.event-info-card h2{

    font-size:38px;

    font-weight:700;

}

.event-info-card p{

    color:#CBD5E1;

    margin-top:12px;

}

.event-meta{

    display:flex;

    gap:30px;

    flex-wrap:wrap;

    margin-top:25px;

}

.event-meta span{

    color:#CBD5E1;

    font-weight:500;

}

.event-meta i{

    color:#3B82F6;

    margin-right:8px;

}

.visibility-badge{

    display:inline-block;

    padding:10px 18px;

    border-radius:12px;

    background:#2563EB;

    font-weight:600;

}

/*=====================================
Statistics
=====================================*/

.stats-card{

    background:#1E293B;

    border-radius:20px;

    padding:35px;

    border:1px solid rgba(255,255,255,.08);

    text-align:center;

    transition:.3s;

}

.stats-card:hover{

    transform:translateY(-6px);

    box-shadow:0 15px 35px rgba(0,0,0,.30);

}

.stats-card h2{

    font-size:42px;

    font-weight:700;

    color:#22C55E;

}

.stats-card p{

    margin-top:8px;

    color:#94A3B8;

    font-size:17px;

}

/*=====================================
Section Title
=====================================*/

.section-title{

    margin-bottom:25px;

    font-size:30px;

    font-weight:700;

}

/*=====================================
Attendee Card
=====================================*/

.attendee-card{

    background:#1E293B;

    border-radius:18px;

    padding:20px;

    border:1px solid rgba(255,255,255,.08);

    margin-bottom:18px;

    transition:.3s;

}

.attendee-card:hover{

    transform:translateY(-4px);

}

.user-avatar{

    width:60px;

    height:60px;

    border-radius:50%;

    object-fit:cover;

}

.user-name{

    font-size:18px;

    font-weight:600;

}

.user-email{

    color:#94A3B8;

    font-size:14px;

}

.status-badge{

    padding:6px 14px;

    border-radius:10px;

    font-size:13px;

    font-weight:600;

}

.pending{

    background:#F59E0B;

    color:white;

}

.going{

    background:#22C55E;

    color:white;

}

/*=====================================
Buttons
=====================================*/

.btn{

    border-radius:12px;

    height:46px;

    font-weight:600;

}

.btn-primary{

    background:#2563EB;

    border:none;

}

.btn-primary:hover{

    background:#1D4ED8;

}

.btn-success{

    background:#22C55E;

    border:none;

}

.btn-danger{

    border:none;

}

.btn-outline-light{

    border-radius:12px;

}

/*=====================================
Danger Zone
=====================================*/

.danger-card{

    background:#1E293B;

    border:1px solid rgba(239,68,68,.35);

    border-radius:22px;

    padding:30px;

}

.danger-card h3{

    color:#EF4444;

    margin-bottom:10px;

}

.danger-card p{

    color:#94A3B8;

    margin-bottom:25px;

}

/*=====================================
Scrollbar
=====================================*/

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#334155;

    border-radius:20px;

}

/*=====================================
Responsive
=====================================*/

@media(max-width:992px){

.event-banner-card img{

height:300px;

}

.event-info-card{

padding:25px;

}

.event-info-card h2{

font-size:30px;

}

}

@media(max-width:768px){

.event-banner-card img{

height:220px;

}

.event-meta{

flex-direction:column;

gap:12px;

}

.section-title{

font-size:24px;

}

.stats-card{

padding:25px;

}

.stats-card h2{

font-size:32px;

}

.user-avatar{

width:50px;

height:50px;

}

}
</style>

</head>

<body>



<!-- =======================================
Navbar
======================================== -->
<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            EventHub
        </a>

        <div class="d-flex align-items-center">

            <button class="btn btn-primary me-3">
                <i class="bi bi-plus-circle"></i>
                Create Event
            </button>

  
        </div>

    </div>

</nav>





<!-- =======================================
Event Banner
======================================== -->

<section class="py-5">

<div class="container">

<div class="event-banner-card">

<img id="eventBanner"
     src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=1600">

</div>

</div>

</section>





<!-- =======================================
Event Information
======================================== -->

<section>

<div class="container">

<div class="event-info-card">

<div class="row">

<div class="col-lg-8">

<span class="badge bg-primary mb-3"
      id="eventCategory">

Technology

</span>

Learn AI from industry experts.

<div class="event-meta">

<span>

<i class="bi bi-calendar3"></i>

<span id="eventDate">

12 July 2026

</span>

</span>

<span>

<i class="bi bi-clock"></i>

<span id="eventTime">

10:00 AM

</span>

</span>

<span>

<i class="bi bi-geo-alt"></i>

<span id="eventLocation">

Bengaluru

</span>

</span>

</div>

</div>

<div class="col-lg-4 text-lg-end mt-4 mt-lg-0">

<span class="visibility-badge"
      id="eventVisibility">

Public

</span>

</div>

</div>

</div>

</div>

</section>





<!-- =======================================
Statistics
======================================== -->

<section class="py-5">

<div class="container">

<div class="row g-4">

<div class="col-md-6">

<div class="stats-card">

<h2 id="goingCount">

0

</h2>

<p>

Going

</p>

</div>

</div>

<div class="col-md-6">

<div class="stats-card">

<h2 id="pendingCount">

0

</h2>

<p>

Pending

</p>

</div>

</div>

</div>

</div>

</section>





<!-- =======================================
Pending Requests
======================================== -->

<section class="pb-5">

<div class="container">

<h3 class="section-title">

Pending Requests

</h3>

<div id="pendingContainer">

<!-- JS -->

</div>

</div>

</section>





<!-- =======================================
Registered Users
======================================== -->

<section class="pb-5">

<div class="container">

<h3 class="section-title">

Registered Users

</h3>

<div id="goingContainer">

<!-- JS -->

</div>

</div>

</section>





<!-- =======================================
Danger Zone
======================================== -->

<section class="pb-5">

<div class="container">

<div class="danger-card">

<h3>

Danger Zone

</h3>

<p>

These actions cannot be undone.

</p>

<div class="d-flex gap-3 flex-wrap">

<button class="btn btn-primary"
        id="editEvent">

<i class="bi bi-pencil-square"></i>

Edit Event

</button>

<button class="btn btn-danger"
        id="deleteEvent">

<i class="bi bi-trash3"></i>

Delete Event

</button>

</div>

</div>

</div>

</section>





<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->

<script>
  // =========================================================
  // CONSTANTS
  // Centralized so field names / keys are never typo'd twice
  // =========================================================
  const STORAGE_KEY = "events";
  const STATUS = { PENDING: "Pending", GOING: "Going" };
  const DEFAULT_BANNER_IMAGE =
    "https://images.unsplash.com/photo-1511578314322-379afb476865?w=1600";
  const DEFAULT_AVATAR_IMAGE =
    "https://ui-avatars.com/api/?background=334155&color=fff&name=User";
  const DASHBOARD_URL = "organizer-dashboard.html";
  const EDIT_EVENT_URL = "create-event.html";

  // =========================================================
  // DOM ELEMENT CACHE
  // Grabbed once, reused everywhere instead of re-querying
  // =========================================================
  const dom = {
    banner: document.getElementById("eventBanner"),
    title: document.getElementById("eventTitle"),
    category: document.getElementById("eventCategory"),
    description: document.getElementById("eventDescription"),
    date: document.getElementById("eventDate"),
    time: document.getElementById("eventTime"),
    location: document.getElementById("eventLocation"),
    visibility: document.getElementById("eventVisibility"),
    goingCount: document.getElementById("goingCount"),
    pendingCount: document.getElementById("pendingCount"),
    pendingContainer: document.getElementById("pendingContainer"),
    goingContainer: document.getElementById("goingContainer"),
    editBtn: document.getElementById("editEvent"),
    deleteBtn: document.getElementById("deleteEvent"),
  };

  // In-memory state. `events` is the full list, `currentEvent`
  // is the single event this page is managing.
  let events = [];
  let currentEvent = null;

  // =========================================================
  // UTILITY HELPERS
  // =========================================================

  /**
   * Safely reads events array from LocalStorage.
   * Returns [] if the key is missing, corrupt, or not an array,
   * instead of letting JSON.parse throw and crash the page.
   */
  function loadEventsFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (error) {
      console.error("Failed to parse events from LocalStorage:", error);
      return [];
    }
  }

  /** Persists the full events array back to LocalStorage. */
  function saveEventsToStorage(eventList) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(eventList));
  }

  /**
   * Finds an event by ID, comparing as strings so it doesn't matter
   * whether IDs were stored as numbers or strings elsewhere in the app.
   */
  function findEventById(eventList, id) {
    return eventList.find((event) => String(event?.id) === String(id));
  }

  /** Escapes user-entered text before it goes into innerHTML. */
  function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value ?? "";
    return div.innerHTML;
  }

  /** Formats a start/end date pair into a readable string. */
  function formatDateRange(startDate, endDate) {
    if (!startDate) return "Date not specified";
    const start = new Date(startDate).toLocaleDateString("en-IN", {
      day: "numeric",
      month: "long",
      year: "numeric",
    });
    if (!endDate || endDate === startDate) return start;
    const end = new Date(endDate).toLocaleDateString("en-IN", {
      day: "numeric",
      month: "long",
      year: "numeric",
    });
    return `${start} - ${end}`;
  }

  /** Formats a start/end time pair into a readable string. */
  function formatTimeRange(startTime, endTime) {
    if (!startTime) return "Time not specified";
    return endTime ? `${startTime} - ${endTime}` : startTime;
  }

  /** Returns a safe image URL, falling back to a placeholder if empty. */
  function resolveImage(url, fallback) {
    return url && url.trim() !== "" ? url : fallback;
  }

  // =========================================================
  // INITIAL LOAD
  // =========================================================

  function initEventManagementPage() {
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get("id");

    events = loadEventsFromStorage();
    currentEvent = findEventById(events, eventId);

    if (!eventId || !currentEvent) {
      alert("This event could not be found. Returning to the dashboard.");
      window.location.href = DASHBOARD_URL;
      return;
    }

    // Defensive default: guarantee attendees is always an array
    // so every downstream filter/map is safe.
    if (!Array.isArray(currentEvent.attendees)) {
      currentEvent.attendees = [];
    }

    renderEventDetails();
    renderAttendees();
    attachStaticEventListeners();
  }

  // =========================================================
  // RENDER: EVENT DETAILS
  // =========================================================

  function renderEventDetails() {
    dom.banner.src = resolveImage(currentEvent.bannerImage, DEFAULT_BANNER_IMAGE);
    dom.banner.onerror = () => (dom.banner.src = DEFAULT_BANNER_IMAGE);

    dom.title.textContent = currentEvent.title || "Untitled Event";
    dom.category.textContent = currentEvent.category || "Uncategorized";
    dom.description.textContent =
      currentEvent.description || currentEvent.shortDescription || "No description provided.";

    dom.date.textContent = formatDateRange(currentEvent.startDate, currentEvent.endDate);
    dom.time.textContent = formatTimeRange(currentEvent.startTime, currentEvent.endTime);
    dom.location.textContent = currentEvent.location || "Location not specified";
    dom.visibility.textContent = currentEvent.visibility || "Public";
  }

  // =========================================================
  // RENDER: ATTENDEES (stats + both lists)
  // =========================================================

  function renderAttendees() {
    const attendees = currentEvent.attendees ?? [];
    const pendingUsers = attendees.filter((user) => user?.status === STATUS.PENDING);
    const goingUsers = attendees.filter((user) => user?.status === STATUS.GOING);

    dom.pendingCount.textContent = pendingUsers.length;
    dom.goingCount.textContent = goingUsers.length;

    renderAttendeeList(dom.pendingContainer, pendingUsers, true, "No pending registration requests.");
    renderAttendeeList(dom.goingContainer, goingUsers, false, "No attendees have been approved yet.");
  }

  /**
   * Renders one list (pending or going) into the given container.
   * Reused for both sections instead of duplicating markup.
   */
  function renderAttendeeList(container, users, isPending, emptyMessage) {
    if (users.length === 0) {
      container.innerHTML = `<p class="text-secondary">${emptyMessage}</p>`;
      return;
    }

    const cardsHtml = users.map((user) => createAttendeeCard(user, isPending)).join("");
    container.innerHTML = cardsHtml;
  }

  /** Builds the HTML for a single attendee card. */
  function createAttendeeCard(user, isPending) {
    const safeName = escapeHtml(user?.name || "Unknown Attendee");
    const safeEmail = escapeHtml(user?.email || "No email provided");
    const avatarSrc = resolveImage(user?.image, DEFAULT_AVATAR_IMAGE);
    const userId = escapeHtml(user?.id ?? "");

    const actionButtons = isPending
      ? `
        <button class="btn btn-success me-2" data-action="approve" data-id="${userId}">
          Approve
        </button>
        <button class="btn btn-danger" data-action="reject" data-id="${userId}">
          Reject
        </button>
      `
      : `
        <span class="status-badge going">Going</span>
        <button class="btn btn-outline-danger ms-3" data-action="remove" data-id="${userId}">
          Remove
        </button>
      `;

    return `
      <div class="attendee-card">
        <div class="row align-items-center">
          <div class="col-lg-6 d-flex align-items-center">
            <img src="${avatarSrc}" class="user-avatar me-3"
                 onerror="this.src='${DEFAULT_AVATAR_IMAGE}'">
            <div>
              <div class="user-name">${safeName}</div>
              <div class="user-email">${safeEmail}</div>
            </div>
          </div>
          <div class="col-lg-6 text-lg-end mt-3 mt-lg-0">
            ${actionButtons}
          </div>
        </div>
      </div>
    `;
  }

  // =========================================================
  // ATTENDEE ACTIONS
  // =========================================================

  function approveAttendee(userId) {
    const user = currentEvent.attendees.find((u) => String(u?.id) === String(userId));
    if (!user) return;
    user.status = STATUS.GOING;
    persistAndRerender();
  }

  function rejectAttendee(userId) {
    currentEvent.attendees = currentEvent.attendees.filter(
      (u) => String(u?.id) !== String(userId)
    );
    persistAndRerender();
  }

  function removeAttendee(userId) {
    currentEvent.attendees = currentEvent.attendees.filter(
      (u) => String(u?.id) !== String(userId)
    );
    persistAndRerender();
  }

  /** Saves currentEvent back into the full list, persists, then re-renders. */
  function persistAndRerender() {
    events = events.map((event) =>
      String(event.id) === String(currentEvent.id) ? currentEvent : event
    );
    saveEventsToStorage(events);
    renderAttendees();
  }

  // =========================================================
  // EVENT LISTENERS
  // =========================================================

  function attachStaticEventListeners() {
    // Delegated listener: one handler per container instead of
    // inline onclick attributes on every generated button.
    dom.pendingContainer.addEventListener("click", handleAttendeeAction);
    dom.goingContainer.addEventListener("click", handleAttendeeAction);

    dom.deleteBtn.addEventListener("click", handleDeleteEvent);
    dom.editBtn.addEventListener("click", handleEditEvent);
  }

  function handleAttendeeAction(clickEvent) {
    const button = clickEvent.target.closest("button[data-action]");
    if (!button) return;

    const { action, id } = button.dataset;

    if (action === "approve") approveAttendee(id);
    else if (action === "reject") rejectAttendee(id);
    else if (action === "remove") removeAttendee(id);
  }

  function handleDeleteEvent() {
    const confirmed = confirm("Are you sure you want to delete this event? This cannot be undone.");
    if (!confirmed) return;

    events = events.filter((event) => String(event.id) !== String(currentEvent.id));
    saveEventsToStorage(events);
    window.location.href = DASHBOARD_URL;
  }

  function handleEditEvent() {
    window.location.href = `${EDIT_EVENT_URL}?id=${encodeURIComponent(currentEvent.id)}`;
  }

  // =========================================================
  // ENTRY POINT
  // =========================================================
  initEventManagementPage();
</script>
</body>

</html>
