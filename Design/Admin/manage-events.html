<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manage Event</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
<style>
    /*=====================================
Google Font
=====================================*/

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0F172A;
    color:#F8FAFC;
}

/*=====================================
Navbar
=====================================*/

.navbar{
    background:#111827;
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:18px 0;
}

.navbar-brand{
    font-size:26px;
}

/*=====================================
Banner
=====================================*/

.event-banner-card{

    overflow:hidden;

    border-radius:22px;

    border:1px solid rgba(255,255,255,.08);

    background:#1E293B;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.event-banner-card img{

    width:100%;

    height:400px;

    object-fit:cover;

}

/*=====================================
Event Info
=====================================*/

.event-info-card{

    background:#1E293B;

    border-radius:22px;

    padding:35px;

    border:1px solid rgba(255,255,255,.08);

    margin-bottom:40px;

}

.event-info-card h2{

    font-size:38px;

    font-weight:700;

}

.event-info-card p{

    color:#CBD5E1;

    margin-top:12px;

}

.event-meta{

    display:flex;

    gap:30px;

    flex-wrap:wrap;

    margin-top:25px;

}

.event-meta span{

    color:#CBD5E1;

    font-weight:500;

}

.event-meta i{

    color:#3B82F6;

    margin-right:8px;

}

.visibility-badge{

    display:inline-block;

    padding:10px 18px;

    border-radius:12px;

    background:#2563EB;

    font-weight:600;

}

/*=====================================
Statistics
=====================================*/

.stats-card{

    background:#1E293B;

    border-radius:20px;

    padding:35px;

    border:1px solid rgba(255,255,255,.08);

    text-align:center;

    transition:.3s;

}

.stats-card:hover{

    transform:translateY(-6px);

    box-shadow:0 15px 35px rgba(0,0,0,.30);

}

.stats-card h2{

    font-size:42px;

    font-weight:700;

    color:#22C55E;

}

.stats-card p{

    margin-top:8px;

    color:#94A3B8;

    font-size:17px;

}

/*=====================================
Section Title
=====================================*/

.section-title{

    margin-bottom:25px;

    font-size:30px;

    font-weight:700;

}

/*=====================================
Attendee Card
=====================================*/

.attendee-card{

    background:#1E293B;

    border-radius:18px;

    padding:20px;

    border:1px solid rgba(255,255,255,.08);

    margin-bottom:18px;

    transition:.3s;

}

.attendee-card:hover{

    transform:translateY(-4px);

}

.user-avatar{

    width:60px;

    height:60px;

    border-radius:50%;

    object-fit:cover;

}

.user-name{

    font-size:18px;

    font-weight:600;

}

.user-email{

    color:#94A3B8;

    font-size:14px;

}

.status-badge{

    padding:6px 14px;

    border-radius:10px;

    font-size:13px;

    font-weight:600;

}

.pending{

    background:#F59E0B;

    color:white;

}

.going{

    background:#22C55E;

    color:white;

}

/*=====================================
Buttons
=====================================*/

.btn{

    border-radius:12px;

    height:46px;

    font-weight:600;

}

.btn-primary{

    background:#2563EB;

    border:none;

}

.btn-primary:hover{

    background:#1D4ED8;

}

.btn-success{

    background:#22C55E;

    border:none;

}

.btn-danger{

    border:none;

}

.btn-outline-light{

    border-radius:12px;

}

/*=====================================
Danger Zone
=====================================*/

.danger-card{

    background:#1E293B;

    border:1px solid rgba(239,68,68,.35);

    border-radius:22px;

    padding:30px;

}

.danger-card h3{

    color:#EF4444;

    margin-bottom:10px;

}

.danger-card p{

    color:#94A3B8;

    margin-bottom:25px;

}

/*=====================================
Scrollbar
=====================================*/

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#334155;

    border-radius:20px;

}

/*=====================================
Responsive
=====================================*/

@media(max-width:992px){

.event-banner-card img{

height:300px;

}

.event-info-card{

padding:25px;

}

.event-info-card h2{

font-size:30px;

}

}

@media(max-width:768px){

.event-banner-card img{

height:220px;

}

.event-meta{

flex-direction:column;

gap:12px;

}

.section-title{

font-size:24px;

}

.stats-card{

padding:25px;

}

.stats-card h2{

font-size:32px;

}

.user-avatar{

width:50px;

height:50px;

}

}
</style>

</head>

<body>



<!-- =======================================
Navbar
======================================== -->

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand fw-bold text-white"
           href="organizer-dashboard.html">

            EventHub

        </a>

        <a href="organizer-dashboard.html"
           class="btn btn-outline-light">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    </div>

</nav>





<!-- =======================================
Event Banner
======================================== -->

<section class="py-5">

<div class="container">

<div class="event-banner-card">

<img id="eventBanner"
     src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=1600">

</div>

</div>

</section>





<!-- =======================================
Event Information
======================================== -->

<section>

<div class="container">

<div class="event-info-card">

<div class="row">

<div class="col-lg-8">

<span class="badge bg-primary mb-3"
      id="eventCategory">

Technology

</span>

<h2 id="eventTitle">

AI Workshop

</h2>

<p id="eventDescription">

Learn AI from industry experts.

</p>

<div class="event-meta">

<span>

<i class="bi bi-calendar3"></i>

<span id="eventDate">

12 July 2026

</span>

</span>

<span>

<i class="bi bi-clock"></i>

<span id="eventTime">

10:00 AM

</span>

</span>

<span>

<i class="bi bi-geo-alt"></i>

<span id="eventLocation">

Bengaluru

</span>

</span>

</div>

</div>

<div class="col-lg-4 text-lg-end mt-4 mt-lg-0">

<span class="visibility-badge"
      id="eventVisibility">

Public

</span>

</div>

</div>

</div>

</div>

</section>





<!-- =======================================
Statistics
======================================== -->

<section class="py-5">

<div class="container">

<div class="row g-4">

<div class="col-md-6">

<div class="stats-card">

<h2 id="goingCount">

0

</h2>

<p>

Going

</p>

</div>

</div>

<div class="col-md-6">

<div class="stats-card">

<h2 id="pendingCount">

0

</h2>

<p>

Pending

</p>

</div>

</div>

</div>

</div>

</section>





<!-- =======================================
Pending Requests
======================================== -->

<section class="pb-5">

<div class="container">

<h3 class="section-title">

Pending Requests

</h3>

<div id="pendingContainer">

<!-- JS -->

</div>

</div>

</section>





<!-- =======================================
Registered Users
======================================== -->

<section class="pb-5">

<div class="container">

<h3 class="section-title">

Registered Users

</h3>

<div id="goingContainer">

<!-- JS -->

</div>

</div>

</section>





<!-- =======================================
Danger Zone
======================================== -->

<section class="pb-5">

<div class="container">

<div class="danger-card">

<h3>

Danger Zone

</h3>

<p>

These actions cannot be undone.

</p>

<div class="d-flex gap-3 flex-wrap">

<button class="btn btn-primary"
        id="editEvent">

<i class="bi bi-pencil-square"></i>

Edit Event

</button>

<button class="btn btn-danger"
        id="deleteEvent">

<i class="bi bi-trash3"></i>

Delete Event

</button>

</div>

</div>

</div>

</section>





<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->

<script>

    // =========================================
// Get Event ID
// =========================================

const params = new URLSearchParams(window.location.search);

const eventId = Number(params.get("id"));



// =========================================
// Load Events
// =========================================

let events = JSON.parse(localStorage.getItem("events")) || [];

let currentEvent = events.find(event => event.id === eventId);



// =========================================
// DOM Elements
// =========================================

const banner = document.getElementById("eventBanner");

const title = document.getElementById("eventTitle");

const category = document.getElementById("eventCategory");

const description = document.getElementById("eventDescription");

const date = document.getElementById("eventDate");

const time = document.getElementById("eventTime");

const location = document.getElementById("eventLocation");

const visibility = document.getElementById("eventVisibility");

const goingCount = document.getElementById("goingCount");

const pendingCount = document.getElementById("pendingCount");

const pendingContainer = document.getElementById("pendingContainer");

const goingContainer = document.getElementById("goingContainer");



// =========================================
// Load Event
// =========================================

loadEvent();

function loadEvent(){

    if(!currentEvent){

        alert("Event not found");

        window.location.href="organizer-dashboard.html";

        return;

    }

    banner.src=currentEvent.banner;

    title.textContent=currentEvent.title;

    category.textContent=currentEvent.category;

    description.textContent=currentEvent.description;

    date.textContent=currentEvent.date;

    time.textContent=currentEvent.time;

    location.textContent=currentEvent.location;

    visibility.textContent=currentEvent.visibility;

    renderAttendees();

}



// =========================================
// Render Users
// =========================================

function renderAttendees(){

    pendingContainer.innerHTML="";

    goingContainer.innerHTML="";

    const pending=currentEvent.attendees.filter(user=>user.status==="Pending");

    const going=currentEvent.attendees.filter(user=>user.status==="Going");

    pendingCount.textContent=pending.length;

    goingCount.textContent=going.length;



    pending.forEach(user=>{

        pendingContainer.innerHTML+=`

<div class="attendee-card">

<div class="row align-items-center">

<div class="col-lg-6 d-flex align-items-center">

<img src="${user.image}"

class="user-avatar me-3">

<div>

<div class="user-name">

${user.name}

</div>

<div class="user-email">

${user.email}

</div>

</div>

</div>

<div class="col-lg-6 text-lg-end mt-3 mt-lg-0">

<button

class="btn btn-success me-2"

onclick="approveUser(${user.id})">

Approve

</button>

<button

class="btn btn-danger"

onclick="rejectUser(${user.id})">

Reject

</button>

</div>

</div>

</div>

`;

    });





    going.forEach(user=>{

        goingContainer.innerHTML+=`

<div class="attendee-card">

<div class="row align-items-center">

<div class="col-lg-6 d-flex align-items-center">

<img

src="${user.image}"

class="user-avatar me-3">

<div>

<div class="user-name">

${user.name}

</div>

<div class="user-email">

${user.email}

</div>

</div>

</div>

<div class="col-lg-6 text-lg-end mt-3 mt-lg-0">

<span class="status-badge going">

Going

</span>

<button

class="btn btn-outline-danger ms-3"

onclick="removeUser(${user.id})">

Remove

</button>

</div>

</div>

</div>

`;

    });

}



// =========================================
// Approve
// =========================================

function approveUser(id){

    const user=currentEvent.attendees.find(user=>user.id===id);

    user.status="Going";

    saveChanges();

}



// =========================================
// Reject
// =========================================

function rejectUser(id){

    currentEvent.attendees=currentEvent.attendees.filter(user=>user.id!==id);

    saveChanges();

}



// =========================================
// Remove
// =========================================

function removeUser(id){

    currentEvent.attendees=currentEvent.attendees.filter(user=>user.id!==id);

    saveChanges();

}



// =========================================
// Save
// =========================================

function saveChanges(){

    events=events.map(event=>{

        if(event.id===currentEvent.id){

            return currentEvent;

        }

        return event;

    });

    localStorage.setItem("events",JSON.stringify(events));

    renderAttendees();

}



// =========================================
// Delete Event
// =========================================

document.getElementById("deleteEvent").onclick=function(){

    if(!confirm("Delete this event?")) return;

    events=events.filter(event=>event.id!==currentEvent.id);

    localStorage.setItem("events",JSON.stringify(events));

    window.location.href="organizer-dashboard.html";

}



// =========================================
// Edit Event
// =========================================

document.getElementById("editEvent").onclick=function(){

    window.location.href=`create-event.html?id=${currentEvent.id}`;

}
</script>

</body>

</html>
