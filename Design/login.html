<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seed | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">

    <style>

        /* ===========================
   Google Font
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#0d1117;
    color:#fff;
    overflow-x:hidden;
    position:relative;
}

/* ===========================
   Background
=========================== */

.background-overlay{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#1d4ed840,transparent 35%),
    radial-gradient(circle at bottom right,#2563eb35,transparent 30%),
    linear-gradient(135deg,#0d1117,#111827,#0d1117);
    z-index:-2;
}

/* Decorative circles */

body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
}

body::before{
    width:280px;
    height:280px;
    background:#2563eb55;
    top:-80px;
    left:-80px;
}

body::after{
    width:300px;
    height:300px;
    background:#06b6d455;
    right:-100px;
    bottom:-100px;
}

/* ===========================
   Navbar
=========================== */

.navbar{
    background:#151923;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar-brand{
    color:#fff !important;
    letter-spacing:.5px;
}

.btn-outline-light{
    border-radius:12px;
    transition:.3s;
}

.btn-outline-light:hover{
    background:#22c1ee;
    border-color:#22c1ee;
    color:#000;
}

/* ===========================
   Section
=========================== */

.login-section{
    min-height:calc(100vh - 90px);
    display:flex;
    align-items:center;
    padding:60px 0;
}

/* ===========================
   Card
=========================== */

.login-card{
    background:rgba(25,32,48,.75);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:45px;
    box-shadow:
    0 15px 45px rgba(0,0,0,.4);
    transition:.35s;
}

.login-card:hover{
    transform:translateY(-5px);
    box-shadow:
    0 20px 60px rgba(34,193,238,.2);
}

/* ===========================
   Icon
=========================== */

.login-icon{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#1f3b70;
    border:1px solid #2c6bff;
}

.login-icon i{
    font-size:42px;
    color:#22c1ee;
}

/* ===========================
   Heading
=========================== */

h2{
    font-weight:700;
    color:#fff;
}

p{
    color:#aab3c5;
}

/* ===========================
   Labels
=========================== */

.form-label{
    color:#dce3ef;
    font-weight:500;
}

/* ===========================
   Inputs
=========================== */

.input-group-text{
    background:#1b2435;
    color:#8aa5d8;
    border:none;
}

.form-control{
    background:#1b2435;
    color:#fff;
    border:none;
    height:55px;
}

.form-control::placeholder{
    color:#7c869d;
}

.form-control:focus{
    background:#1b2435;
    color:#fff;
    border:none;
    box-shadow:0 0 0 .25rem rgba(34,193,238,.2);
}

/* ===========================
   Password Button
=========================== */

.password-btn{
    background:#1b2435;
    color:#9cb2d6;
    border:none;
}

.password-btn:hover{
    background:#24314b;
    color:#22c1ee;
}

/* ===========================
   Remember
=========================== */

.form-check-input{
    background:#202838;
    border-color:#3b82f6;
}

.form-check-input:checked{
    background:#22c1ee;
    border-color:#22c1ee;
}

.form-check-label{
    color:#b8c1d6;
}

.forgot-link{
    color:#22c1ee;
    text-decoration:none;
    transition:.3s;
}

.forgot-link:hover{
    color:#62d8ff;
}

/* ===========================
   Login Button
=========================== */

.login-btn{
    height:55px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#1da1f2,#22d3ee);
    color:#000;
    font-size:17px;
    font-weight:700;
    transition:.35s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(34,193,238,.45);
}

/* ===========================
   Links
=========================== */

.signup-link{
    color:#22c1ee;
    font-weight:600;
    text-decoration:none;
}

.signup-link:hover{
    color:#63d7ff;
}

/* ===========================
   Error
=========================== */

.error{
    color:#ff6b81;
    display:block;
    margin-top:6px;
    font-size:14px;
}

/* ===========================
   Spinner
=========================== */

.spinner-border{
    width:20px;
    height:20px;
}

/* ===========================
   Responsive
=========================== */

@media(max-width:768px){

.login-card{
    padding:30px;
}

.login-section{
    padding:30px 15px;
}

.navbar-brand{
    font-size:32px !important;
}

}

@media(max-width:576px){

.login-card{
    padding:25px;
    border-radius:20px;
}

.login-icon{
    width:80px;
    height:80px;
}

.login-icon i{
    font-size:34px;
}

h2{
    font-size:30px;
}

.form-control{
    height:50px;
}

.login-btn{
    height:50px;
}

}
    </style>
</head>

<body>

    <!-- Background -->
    <div class="background-overlay"></div>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">

            <a class="navbar-brand fw-bold fs-2" href="#">
                Seed
            </a>

            <div class="ms-auto">

                <a href="signup.html" class="btn btn-outline-light rounded-pill px-4">
                    Sign Up
                </a>

            </div>

        </div>
    </nav>

    <!-- Login Section -->

    <section class="login-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-5 col-md-7">

                    <div class="login-card">

                        <div class="text-center mb-4">

                            <div class="login-icon">

                                <i class="bi bi-person-circle"></i>

                            </div>

                            <h2 class="mt-3">
                                Welcome Back
                            </h2>

                            <p class="text-secondary">
                                Login to continue exploring amazing events.
                            </p>

                        </div>

                        <form id="loginForm">

                            <!-- Email -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-envelope"></i>

                                    </span>

                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="Enter your email">

                                </div>

                                <small class="error" id="emailError"></small>

                            </div>

                            <!-- Password -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-lock"></i>

                                    </span>

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter your password">

                                    <button
                                        type="button"
                                        class="btn password-btn"
                                        id="togglePassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                                <small class="error" id="passwordError"></small>

                            </div>

                            <!-- Remember -->

                            <div
                                class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="remember">

                                    <label
                                        class="form-check-label">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="#" class="forgot-link">

                                    Forgot Password?

                                </a>

                            </div>

                            <!-- Button -->
           
                          
                                <button
                                type="submit"
                                class="btn login-btn w-100"
                                id="loginBtn">

                                <span id="btnText">

                                    Login

                                </span>

                                <span
                                    id="spinner"
                                    class="spinner-border spinner-border-sm d-none">

                                </span>

                            </button>
                   
                            

                        </form>

                        <div class="text-center mt-4">

                            <p class="mb-0">

                                Don't have an account?

                                <a
                                    href="signup.html"
                                    class="signup-link">

                                    Create Account

                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script>


// ===============================
// Elements
// ===============================

const loginForm = document.getElementById("loginForm");
const email = document.getElementById("email");
const password = document.getElementById("password");

const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");

const togglePassword = document.getElementById("togglePassword");

const btnText = document.getElementById("btnText");
const spinner = document.getElementById("spinner");

// ===============================
// Show / Hide Password
// ===============================

togglePassword.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";
        togglePassword.innerHTML =
        '<i class="bi bi-eye-slash-fill"></i>';

    }else{

        password.type = "password";
        togglePassword.innerHTML =
        '<i class="bi bi-eye-fill"></i>';

    }

});

// ===============================
// Email Validation
// ===============================

function validateEmail(emailValue){

    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    return regex.test(emailValue);

}

// ===============================
// Login
// ===============================

loginForm.addEventListener("submit", function(e){

    e.preventDefault();

    emailError.textContent = "";
    passwordError.textContent = "";

    const emailValue = email.value.trim();
    const passwordValue = password.value.trim();

    let valid = true;

    if(emailValue === ""){

        emailError.textContent = "Email is required.";
        valid = false;

    }
    else if(!validateEmail(emailValue)){

        emailError.textContent = "Enter a valid email.";
        valid = false;

    }

    if(passwordValue === ""){

        passwordError.textContent = "Password is required.";
        valid = false;

    }

    if(!valid) return;

    // Loading Animation

    btnText.textContent = "Logging In...";
    spinner.classList.remove("d-none");

    setTimeout(() => {

        spinner.classList.add("d-none");
        btnText.textContent = "Login";

        alert("Login Successful!");

        window.location.href = "./User/homepage.html";

    },1500);

});
    </script>

</body>

</html>
