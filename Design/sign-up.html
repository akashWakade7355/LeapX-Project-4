<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seed | Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="signup.css">
     <style>

        /* ==========================================
   Google Font
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#0d1117;
    color:#fff;
    overflow-x:hidden;
    position:relative;
}

/* ==========================================
   Background
========================================== */

.background-overlay{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#1d4ed840,transparent 35%),
    radial-gradient(circle at bottom right,#2563eb35,transparent 30%),
    linear-gradient(135deg,#0d1117,#111827,#0d1117);
    z-index:-2;
}

body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    z-index:-1;
}

body::before{
    width:300px;
    height:300px;
    background:#2563eb55;
    top:-80px;
    left:-80px;
}

body::after{
    width:320px;
    height:320px;
    background:#06b6d455;
    bottom:-100px;
    right:-100px;
}

/* ==========================================
   Navbar
========================================== */

.navbar{
    background:#151923;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar-brand{
    color:#fff !important;
    font-weight:700;
}

.btn-outline-light{
    border-radius:12px;
    transition:.3s;
}

.btn-outline-light:hover{
    background:#22c1ee;
    border-color:#22c1ee;
    color:#000;
}

/* ==========================================
   Signup Section
========================================== */

.signup-section{
    min-height:calc(100vh - 90px);
    display:flex;
    align-items:center;
    padding:60px 0;
}

/* ==========================================
   Signup Card
========================================== */

.signup-card{

    background:rgba(25,32,48,.78);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:45px;
    box-shadow:0 15px 45px rgba(0,0,0,.4);
    transition:.35s;

}

.signup-card:hover{

    transform:translateY(-5px);
    box-shadow:0 20px 60px rgba(34,193,238,.2);

}

/* ==========================================
   Icon
========================================== */

.signup-icon{

    width:60px;
    height:60px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1f3b70;
    border:1px solid #2c6bff;

}

.signup-icon i{

    font-size:30px;
    color:#22c1ee;

}

/* ==========================================
   Heading
========================================== */

h2{

    font-weight:600;
    color:#fff;

}

p{

    color:#b9c3d8;

}

/* ==========================================
   Labels
========================================== */

.form-label{

    color:#dce3ef;
    font-weight:600;

}

/* ==========================================
   Inputs
========================================== */

.form-control{

    height:55px;
    background:#1b2435;
    color:#fff;
    border:none;
    border-radius:12px;

}

.form-control::placeholder{

    color:#7f8aa5;

}

.form-control:focus{

    background:#1b2435;
    color:#fff;
    box-shadow:0 0 0 .25rem rgba(34,193,238,.2);

}

/* ==========================================
   Password Button
========================================== */

.password-btn{

    background:#1b2435;
    color:#9cb2d6;
    border:none;
    border-radius:0 12px 12px 0;

}

.password-btn:hover{

    background:#24314b;
    color:#22c1ee;

}

/* ==========================================
   Password Strength
========================================== */

.progress{

    height:8px;
    margin-top:10px;
    background:#2b364d;
    border-radius:50px;
    overflow:hidden;

}

.progress-bar{

    width:0%;
    transition:.4s;

}

#strengthText{

    display:block;
    margin-top:8px;
    font-size:14px;
    color:#b8c1d6;

}

/* ==========================================
   Checkbox
========================================== */

.form-check-input{

    background:#202838;
    border-color:#3b82f6;

}

.form-check-input:checked{

    background:#22c1ee;
    border-color:#22c1ee;

}

.form-check-label{

    color:#cfd6e4;

}

/* ==========================================
   Button
========================================== */

.signup-btn{

    height:55px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#1da1f2,#22d3ee);
    color:#000;
    font-size:17px;
    font-weight:700;
    transition:.35s;

}

.signup-btn:hover{

    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(34,193,238,.45);

}

/* ==========================================
   Login Link
========================================== */

.signup-link{

    color:#22c1ee;
    font-weight:600;
    text-decoration:none;

}

.signup-link:hover{

    color:#67dcff;

}

/* ==========================================
   Error
========================================== */

.error{

    color:#ff6b81;
    display:block;
    margin-top:6px;
    font-size:13px;

}

/* ==========================================
   Spinner
========================================== */

.spinner-border{

    width:18px;
    height:18px;

}

/* ==========================================
   Animation
========================================== */

.signup-card{

    animation:fadeIn .8s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;
        transform:translateY(40px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

/* ==========================================
   Responsive
========================================== */

@media(max-width:992px){

.signup-card{

    padding:35px;

}

}

@media(max-width:768px){

.signup-card{

    padding:30px;

}

}

@media(max-width:576px){

.signup-section{

    padding:30px 15px;

}

.signup-card{

    padding:25px;
    border-radius:20px;

}

.signup-icon{

    width:75px;
    height:75px;

}

.signup-icon i{

    font-size:34px;

}

.form-control{

    height:50px;

}

.signup-btn{

    height:50px;

}

}
     </style>

</head>

<body>

    <div class="background-overlay"></div>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark py-3">

        <div class="container">

            <a class="navbar-brand fw-bold fs-2" href="#">
                Seed
            </a>

            <div class="ms-auto">

                <a href="login.html" class="btn btn-outline-light rounded-pill px-4">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <!-- Signup -->

    <section class="signup-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-6 col-md-8">

                    <div class="signup-card">

                        <div class="text-center mb-4">

                            <div class="signup-icon">

                                <i class="bi bi-person-plus-fill"></i>

                            </div>

                            <h2 class="mt-3">
                                Create Account
                            </h2>

                            <p>
                                Join Seed and discover amazing events.
                            </p>

                        </div>

                        <form id="signupForm">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="name"
                                        placeholder="John Doe">

                                    <small class="error" id="nameError"></small>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Username
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="username"
                                        placeholder="john123">

                                    <small class="error" id="usernameError"></small>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="john@gmail.com">

                                <small class="error" id="emailError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="tel"
                                    class="form-control"
                                    id="phone"
                                    placeholder="9876543210">

                                <small class="error" id="phoneError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="input-group">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Create Password">

                                    <button
                                        type="button"
                                        class="btn password-btn"
                                        id="togglePassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                                <div class="progress mt-2">

                                    <div
                                        class="progress-bar"
                                        id="strengthBar">

                                    </div>

                                </div>

                                <small id="strengthText"></small>

                                <small class="error" id="passwordError"></small>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="confirmPassword"
                                    placeholder="Confirm Password">

                                <small class="error" id="confirmError"></small>

                            </div>

                            <div class="form-check mb-4">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="terms">

                                <label class="form-check-label">

                                    I agree to the Terms & Conditions

                                </label>

                                <small class="error" id="termsError"></small>

                            </div>

                            <button
                            type="submit"
                                class="btn signup-btn w-100"
                                id="signupBtn">

                                <span id="btnText">

                                    Create Account

                                </span>

                                <span
                                    class="spinner-border spinner-border-sm d-none"
                                    id="spinner">

                                </span>

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            Already have an account?

                            <a href="login.html" class="signup-link">

                                Login

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script>
// =====================================
// Elements
// =====================================

const signupForm = document.getElementById("signupForm");

const nameInput = document.getElementById("name");
const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const termsInput = document.getElementById("terms");

const togglePassword = document.getElementById("togglePassword");

const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");

const btnText = document.getElementById("btnText");
const spinner = document.getElementById("spinner");

// Error Elements

const nameError = document.getElementById("nameError");
const usernameError = document.getElementById("usernameError");
const emailError = document.getElementById("emailError");
const phoneError = document.getElementById("phoneError");
const passwordError = document.getElementById("passwordError");
const confirmError = document.getElementById("confirmError");
const termsError = document.getElementById("termsError");

// =====================================
// Show / Hide Password
// =====================================

togglePassword.addEventListener("click", () => {

    if(passwordInput.type === "password"){

        passwordInput.type = "text";

        togglePassword.innerHTML =
        '<i class="bi bi-eye-slash-fill"></i>';

    }else{

        passwordInput.type = "password";

        togglePassword.innerHTML =
        '<i class="bi bi-eye-fill"></i>';

    }

});

// =====================================
// Password Strength
// =====================================

passwordInput.addEventListener("input", () => {

    const password = passwordInput.value;

    let strength = 0;

    if(password.length >= 8) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[a-z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[^A-Za-z0-9]/.test(password)) strength++;

    switch(strength){

        case 0:
        case 1:
            strengthBar.style.width = "20%";
            strengthBar.style.background = "#dc3545";
            strengthText.innerHTML = "Weak Password";
            break;

        case 2:
            strengthBar.style.width = "40%";
            strengthBar.style.background = "#fd7e14";
            strengthText.innerHTML = "Fair Password";
            break;

        case 3:
            strengthBar.style.width = "60%";
            strengthBar.style.background = "#ffc107";
            strengthText.innerHTML = "Good Password";
            break;

        case 4:
            strengthBar.style.width = "80%";
            strengthBar.style.background = "#0dcaf0";
            strengthText.innerHTML = "Strong Password";
            break;

        case 5:
            strengthBar.style.width = "100%";
            strengthBar.style.background = "#198754";
            strengthText.innerHTML = "Very Strong Password";
            break;
    }

});

// =====================================
// Validation Functions
// =====================================

function validateEmail(email){

    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

}

function validatePhone(phone){

    return /^[6-9]\d{9}$/.test(phone);

}

function validatePassword(password){

    return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/.test(password);

}

// =====================================
// Signup
// =====================================

signupForm.addEventListener("submit", function(e){

    e.preventDefault();

    // Clear Errors

    nameError.innerHTML = "";
    usernameError.innerHTML = "";
    emailError.innerHTML = "";
    phoneError.innerHTML = "";
    passwordError.innerHTML = "";
    confirmError.innerHTML = "";
    termsError.innerHTML = "";

    let valid = true;

    const name = nameInput.value.trim();
    const username = usernameInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    // Name

    if(name.length < 3){

        nameError.innerHTML = "Please enter your full name.";
        valid = false;

    }

    // Username

    if(username.length < 4){

        usernameError.innerHTML = "Username must contain at least 4 characters.";
        valid = false;

    }

    // Email

    if(!validateEmail(email)){

        emailError.innerHTML = "Please enter a valid email.";
        valid = false;

    }

    // Phone

    if(!validatePhone(phone)){

        phoneError.innerHTML = "Please enter a valid phone number.";
        valid = false;

    }

    // Password

    if(!validatePassword(password)){

        passwordError.innerHTML =
        "Password must contain uppercase, lowercase, number and special character.";

        valid = false;

    }

    // Confirm Password

    if(password !== confirmPassword){

        confirmError.innerHTML =
        "Passwords do not match.";

        valid = false;

    }

    // Terms

    if(!termsInput.checked){

        termsError.innerHTML =
        "Please accept Terms & Conditions.";

        valid = false;

    }

    if(!valid){

        return;

    }

    // Loading Animation

    spinner.classList.remove("d-none");

    btnText.innerHTML = "Creating Account...";

    // Simulate Request

    setTimeout(() => {

        spinner.classList.add("d-none");

        btnText.innerHTML = "Create Account";

        alert("🎉 Account Created Successfully!");

        signupForm.reset();

        strengthBar.style.width = "0%";

        strengthText.innerHTML = "";

        // Redirect

        window.location.href = "./User/homepage.html";

    },1500);

});
    </script>

</body>

</html>
